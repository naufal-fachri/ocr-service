services:
  api:
    build: .
    container_name: ocr_service
    ports:
      - "8001:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PWD}/ocr_results:/app/ocr_results
      - shared_tmp:/tmp/ocr_uploads
    command: >
      uv run uvicorn src.app.api:app
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped
  worker:
    build: .
    container_name: ocr_worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    volumes:
      - ${PWD}/ocr_results:/app/ocr_results
      - shared_tmp:/tmp/ocr_uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      uv run celery -A src.service.celery_app worker
      --loglevel=info
      --hostname=worker_extract@%h
      --concurrency=1
      --pool=threads
      --queues=process_file,ocr_file,combine_results
    restart: unless-stopped
volumes:
  shared_tmp: